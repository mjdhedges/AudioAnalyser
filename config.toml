# Music Analyser Configuration File
# This file defines default parameters for audio analysis
# Parameters can be overridden via command line arguments

[analysis]
# Time-domain analysis parameters
chunk_duration_seconds = 2.0
sample_rate = 44100

# Default directories
tracks_dir = "Tracks"
output_dir = "analysis"

# Octave band analysis parameters
octave_center_frequencies = [16.0, 31.25, 62.5, 125.0, 250.0, 500.0, 1000.0, 2000.0, 4000.0, 8000.0, 16000.0]
filter_order = 4  # All bands use 4th order Butterworth for consistent steepness
# Note: 4th order provides -24dB/octave rolloff, adequate precision at all frequencies

# Plotting parameters
[plotting]
# Figure sizes
octave_spectrum_figsize = [12, 8]
crest_factor_figsize = [12, 8]
histogram_figsize = [15, 10]
crest_factor_time_figsize = [14, 10]
octave_crest_factor_time_figsize = [14, 12]

# Axis limits
octave_spectrum_xlim = [15, 20000]
octave_spectrum_ylim = [-60, 3]
crest_factor_xlim = [15, 20000]
crest_factor_ylim_min = 0
crest_factor_ylim_max = 30
octave_crest_factor_time_ylim = [0, 40]

# Histogram parameters
histogram_bins = 51
histogram_range = [-1, 1]
log_histogram_bins = 51
log_histogram_noise_floor_db = -60
log_histogram_max_db = 0
log_histogram_max_bin_size_db = 3.0

# DPI and quality
dpi = 300
batch_dpi = 150  # Lower DPI for faster batch processing
high_quality_dpi = 300  # For single-file analysis
bbox_inches = "tight"

# Advanced statistics parameters
[advanced_stats]
# Peak analysis thresholds
hot_peaks_threshold_db = -1.0      # Near-clipping events threshold
clip_events_threshold_db = -0.1    # Actual clipping events threshold
peak_saturation_threshold_db = -3.0 # Heavily compressed regions threshold

# Transient analysis
transient_threshold_db = 3.0       # Significant level change threshold

# Envelope analysis parameters
[envelope_analysis]
# RMS envelope calculation (shared with RMS envelope plots)
rms_envelope_window_ms = 10.0

# Peak detection
peak_detection_min_height_db = -40
peak_detection_min_distance_ms = 50.0

# Worst-case envelope analysis (for one-off events like film LFE)
worst_case_num_envelopes = 1  # Find 1-10 worst envelopes
worst_case_sort_by = "peak_value"  # Options: "peak_value", "decay_time", "energy"

# Pattern analysis (for repeating beats)
pattern_min_repetitions = 3  # Minimum repeats to call it a pattern
pattern_max_patterns_per_band = 1  # Number of patterns to detect (start with 1)
pattern_similarity_threshold = 0.85  # Correlation threshold (0-1)
pattern_timing_tolerance_percent = 10.0  # Timing variation tolerance

# Envelope characteristics
attack_threshold_db = -20  # Below peak to detect attack start
peak_hold_threshold_db = -1.0  # Within threshold for peak hold
decay_thresholds_db = [-3.0, -6.0, -9.0, -12.0]  # Decay measurement points

# Envelope visualization
envelope_plots_num_envelopes = 3  # Number of top envelopes to plot per band
envelope_plots_window_ms = 200.0  # Time window around peak to show (ms)
envelope_plots_ylim_min = -30  # Minimum Y-axis limit (dBFS)
envelope_plots_ylim_max = 0  # Maximum Y-axis limit (dBFS)

# Peak distribution ranges (separate arrays for bounds and labels)
peak_distribution_ranges_min = [-0.1, -1.0, -3.0, -6.0, -12.0, -60.0]
peak_distribution_ranges_max = [0.0, -0.1, -1.0, -3.0, -6.0, -12.0]
peak_distribution_ranges_labels = ["clipping", "hot", "loud", "moderate", "quiet", "very_quiet"]

# Frequency band definitions
bass_frequencies = [31.25, 62.5, 125.0]      # Bass energy calculation
mid_frequencies = [250.0, 500.0, 1000.0, 2000.0]  # Mid energy calculation
treble_frequencies = [4000.0, 8000.0, 16000.0]     # Treble energy calculation

# File handling parameters
[file_handling]
# Supported audio formats
supported_formats = ["wav", "flac", "mp3", "aiff", "m4a"]

# Output directory structure
create_subdirectories = true
use_track_name_for_output = true

# CSV export parameters
[export]
# CSV sections to include
include_track_metadata = true
include_advanced_statistics = true
include_octave_band_analysis = true
include_time_domain_analysis = true
include_time_domain_summary = true
include_histogram_data = true
include_extreme_chunks_analysis = true

# Note: Octave crest factor time data is excluded for efficiency
# as it would require recalculating octave analysis for every chunk

# Logging parameters
[logging]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
include_debug_info = false

# Performance parameters
[performance]
# Memory management
max_chunk_size_mb = 100
enable_memory_optimization = true
use_float32 = true  # Use float32 instead of float64 for 50% memory reduction

# Parallel processing for octave bank creation (4-8x speedup on multi-core)
enable_parallel_processing = true
max_workers = 4  # Set to CPU count or leave blank for auto-detection

# Caching for octave banks (near-instant re-analysis)
# DISABLED: Creates 500MB+ cache files per track - not practical
enable_octave_cache = false
cache_dir = "cache/octave_banks"

# Result caching for plots and CSV (skip if unchanged)
enable_result_cache = true
result_cache_dir = "cache/results"

# Batch processing parallelism
# REDUCED: 4 workers = 2GB+ RAM per batch (too high for large tracks)
enable_parallel_batch = true
max_batch_workers = 2  # Use 1-2 workers for reasonable memory usage
