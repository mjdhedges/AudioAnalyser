# ============================================================================
# Music Analyser Configuration File
# ============================================================================
# This file defines default parameters for audio analysis.
# Parameters can be overridden via command line arguments.
# All time values are in seconds unless specified as milliseconds (ms).
# All level values are in dBFS (decibels relative to full scale) unless otherwise noted.
# ============================================================================

# ============================================================================
# AUDIO PROCESSING & ANALYSIS SETTINGS
# ============================================================================
# Core parameters for audio loading, resampling, and chunk processing
# ============================================================================

[analysis]
# Sample rate for audio processing (Hz)
# Audio files will be resampled to this rate if different
# Common values: 44100 (CD quality), 48000 (professional), 96000 (high-res)
sample_rate = 44100

# Duration of each analysis chunk in seconds
# Audio is processed in chunks for memory efficiency
# Smaller chunks = less memory but more processing overhead
# Larger chunks = more memory but faster overall
chunk_duration_seconds = 2.0

# Time constant (seconds) for the crest-factor peak-hold envelope (IEC SLOW style)
# Increase to make the held peak decay more slowly; decrease for faster response
peak_hold_tau_seconds = 2.0

# Time-domain crest factor mode
# Options:
#   "slow"        - IEC-style: peak-hold + slow RMS envelope, sampled at 1s (or configured window)
#   "fixed_chunk" - Fixed-window peak/RMS per analysis.chunk_duration_seconds
time_domain_crest_factor_mode = "slow"

# SLOW-mode configuration (only used when time_domain_crest_factor_mode = "slow")
# Window size and step (seconds). Default 1.0s / 1.0s.
time_domain_slow_window_seconds = 1.0
time_domain_slow_step_seconds = 1.0
# RMS time constant (seconds) for slow RMS envelope
time_domain_slow_rms_tau_seconds = 1.0

# Default input directory for audio tracks
# Can be overridden via command line --tracks-dir option
tracks_dir = "Tracks"

# Default output directory for analysis results
# Can be overridden via command line --output-dir option
output_dir = "analysis"

# Testing: Analyze only a section of the file
# Set start_time to skip to a specific point (seconds)
# Set duration to limit analysis length (seconds)
# Both default to None (analyze entire file) - use command line --test-start-time and --test-duration to override
# Useful for testing long files quickly
# test_start_time = 0.0  # Uncomment and set value to enable
# test_duration = 60.0   # Uncomment and set value to enable


# ============================================================================
# OCTAVE BAND FILTERING SETTINGS
# ============================================================================
# Parameters for frequency-domain analysis using octave band filters
# ============================================================================

# Center frequencies for octave band analysis (Hz)
# Each band covers frequencies from center/sqrt(2) to center*sqrt(2)
# Standard 1/1 octave bands from 16 Hz to 16 kHz
# Full Spectrum (0 Hz) is automatically included for comparison
octave_center_frequencies = [16.0, 31.25, 62.5, 125.0, 250.0, 500.0, 1000.0, 2000.0, 4000.0, 8000.0, 16000.0]

# Filter type for octave band filtering
# true = Use Linkwitz-Riley filters (recommended for cascade complementary approach)
# false = Use Butterworth filters (legacy, parallel processing only)
# Linkwitz-Riley filters are designed for complementary summing and better phase coherence
use_linkwitz_riley = true

# Cascade complementary filter bank approach
# true = Use cascade complementary approach (recommended for crest factor preservation)
#        - Non-overlapping bands
#        - Linear phase (zero-phase via filtfilt)
#        - Better phase coherence
#        - Sequential processing (cannot be parallelized)
# false = Use parallel filter bank approach
#         - Overlapping bands (ISO standard)
#         - Can be parallelized for speed
#         - May have phase interference issues
use_cascade_complementary = true

# Normalize overlapping bands to eliminate ripple
# Only applies when use_cascade_complementary = false (parallel approach)
# true = Apply frequency-dependent normalization to reduce ripple
# false = Use ISO standard bandwidths without normalization
# Not needed with cascade complementary approach (bands don't overlap)
normalize_overlap = false

# Butterworth filter order for octave band filtering (legacy, when use_linkwitz_riley = false)
# Higher order = steeper rolloff, better isolation between bands
# 4th order provides -24 dB/octave rolloff (adequate precision at all frequencies)
# Options: 2, 4, 6, 8 (higher = more CPU intensive)
filter_order = 4


# ============================================================================
# ENVELOPE ANALYSIS SETTINGS
# ============================================================================
# Parameters for time-domain envelope analysis and pattern detection
# Used for analyzing attack, decay, and repeating patterns in audio
# ============================================================================

[envelope_analysis]

# ----------------------------------------------------------------------------
# Envelope Calculation Method
# ----------------------------------------------------------------------------

# Envelope detection method
# Options:
#   "peak_envelope" - Peak envelope follower (recommended, creates line linking wave peaks)
#   "rms_window" - RMS window method (legacy, fixed window size, fallback only)
envelope_method = "peak_envelope"

# Wavelength multiplier for peak envelope release time
# Attack time = 0ms (instantaneous rise to catch peaks immediately)
# Release time = multiplier × wavelength (period = 1/frequency)
# Default 1.0 = release time equals one wavelength (one period)
# Lower values (0.5) = faster release, envelope decays more quickly
# Higher values (2.0) = slower release, smoother envelope decay
# Creates a line that links the peak of every wave cycle
envelope_wavelength_multiplier = 1.0

# Fallback RMS window size for Full Spectrum band (milliseconds)
# Used when center_frequency = 0 Hz (Full Spectrum)
# Only applies when using "rms_window" method or Full Spectrum with "peak_envelope"
rms_envelope_window_ms = 10.0

# ----------------------------------------------------------------------------
# Peak Detection
# ----------------------------------------------------------------------------

# Minimum peak height in dBFS for detection
# Peaks below this threshold are ignored
# Lower values detect more peaks (including quiet ones)
# Higher values only detect loud peaks
peak_detection_min_height_db = -40

# Minimum distance between detected peaks in milliseconds
# Prevents detecting multiple peaks from the same event
# Increase to detect fewer, more distinct peaks
# Decrease to detect closely-spaced peaks
peak_detection_min_distance_ms = 50.0

# ----------------------------------------------------------------------------
# Worst-Case Envelope Analysis (One-Off Events)
# ----------------------------------------------------------------------------
# Identifies non-repeating extreme envelopes (e.g., film LFE explosions)
# These are independent events that don't form repeating patterns

# Number of worst-case envelopes to find per octave band
# These are the most extreme non-repeating events
# Range: 1-10 (more = slower analysis)
worst_case_num_envelopes = 1

# Sorting criterion for worst-case envelope selection
# Options:
#   "peak_value" - Sort by peak level (highest peaks first)
#   "decay_time" - Sort by decay time (longest decays first)
#   "energy" - Sort by total energy content
worst_case_sort_by = "peak_value"

# ----------------------------------------------------------------------------
# Pattern Analysis (Repeating Patterns)
# ----------------------------------------------------------------------------
# Identifies repeating envelope patterns (e.g., kick drum beats, rhythm)

# Minimum number of repetitions required to classify as a pattern
# Patterns must repeat at least this many times
# Higher values = stricter pattern detection (fewer false positives)
# Lower values = more lenient (may detect non-patterns)
pattern_min_repetitions = 3

# Maximum number of patterns to detect per octave band
# Each band can have multiple distinct patterns
# Start with 1 pattern, increase if multiple rhythms exist
pattern_max_patterns_per_band = 1

# Correlation threshold for pattern matching (0.0 to 1.0)
# Higher values = stricter similarity requirement
# 0.85 = patterns must be 85% similar to be grouped together
# Lower values allow more variation in pattern shape
pattern_similarity_threshold = 0.85

# Timing variation tolerance as percentage
# Allows patterns to have slight timing variations (e.g., human feel)
# 10% = patterns can vary by ±10% in timing and still match
# Higher values = more tolerant of timing variations
pattern_timing_tolerance_percent = 10.0

# ----------------------------------------------------------------------------
# Envelope Characteristics Measurement
# ----------------------------------------------------------------------------

# Attack detection threshold in dB below peak
# Attack time is measured from this level to peak
# -20 dB = measure attack from 20 dB below peak
attack_threshold_db = -20

# Peak hold threshold in dB below peak
# Peak hold time measures how long signal stays within this threshold
# -1.0 dB = signal must stay within 1 dB of peak
peak_hold_threshold_db = -1.0

# Decay measurement points in dB below peak
# Measures time to decay to each threshold level
# Values are relative to peak (e.g., -3 dB = 3 dB below peak)
# If decay doesn't reach a threshold, that measurement is omitted
decay_thresholds_db = [-3.0, -6.0, -9.0, -12.0]

# ----------------------------------------------------------------------------
# Sustained Peaks (Hold and Recovery) Analysis
# ----------------------------------------------------------------------------
# Analyzes how long peaks are sustained and recovery times to thresholds
# This supports amplifier-relevant statistics (rest/recovery behavior)
sustained_peaks_enable = true
# Minimum peak value (absolute dBFS) to include in sustained analysis
sustained_peaks_min_peak_dbfs = -3.0
# Thresholds (dB) for recovery time measurement. When relative=true, these are
# relative to the detected peak value (e.g., -3 means peak-3 dB). When false,
# they are absolute dBFS thresholds.
sustained_peaks_thresholds_db = [-3.0, -6.0, -9.0, -12.0]
# If true, thresholds are relative to each peak; if false, absolute dBFS
sustained_peaks_relative = true
# Maximum search window for recovery time (seconds)
# Signals that don't recover within this window are capped at this value
# Increase for content with very long decay times (e.g., sustained music/film)
sustained_peaks_search_window_seconds = 5.0
# Export per-peak events to CSV (can be large); if false, only summary is exported
sustained_peaks_export_events = false

# ----------------------------------------------------------------------------
# Envelope Visualization
# ----------------------------------------------------------------------------

# Number of pattern envelopes to plot per octave band
# Shows the top N repeating pattern envelopes on pattern plots
# More envelopes = more detailed visualization but busier plots
envelope_plots_num_pattern_envelopes = 10

# Number of independent (worst-case) envelopes to plot per octave band
# Shows the top N non-repeating worst-case envelopes on independent plots
# More envelopes = compare more extreme events
envelope_plots_num_independent_envelopes = 3

# Number of wavelengths to show around peak in plots
# Window size is calculated as: num_wavelengths / center_frequency
# Lower frequencies get longer windows, higher frequencies get shorter windows
# This ensures consistent number of cycles shown across all bands
# For Full Spectrum (0 Hz), falls back to absolute window_ms
# Note: Very low frequencies may be capped at max_pattern_window_ms (500ms) for performance
envelope_plots_num_wavelengths = 50

# Fallback absolute time window for Full Spectrum band (milliseconds)
# Used when center frequency is 0 Hz (Full Spectrum)
# Shows envelope from -window/2 to +window/2 around each peak
envelope_plots_window_ms = 200.0

# Y-axis minimum limit for envelope plots (dBFS)
# Lower values show more of the decay tail
envelope_plots_ylim_min = -30

# Y-axis maximum limit for envelope plots (dBFS)
# Upper values show clipping region better
envelope_plots_ylim_max = 0


# ============================================================================
# PLOTTING & VISUALIZATION SETTINGS
# ============================================================================
# Parameters for generating analysis plots and charts
# ============================================================================

[plotting]

# ----------------------------------------------------------------------------
# Figure Sizes (width, height in inches)
# ----------------------------------------------------------------------------

# Size for octave spectrum plots (frequency response)
octave_spectrum_figsize = [12, 8]

# Size for crest factor plots (peak-to-average ratio)
crest_factor_figsize = [12, 8]

# Size for histogram plots (level distribution)
histogram_figsize = [15, 10]

# Size for crest factor vs time plots
crest_factor_time_figsize = [14, 10]

# Size for octave crest factor vs time plots
octave_crest_factor_time_figsize = [14, 12]

# ----------------------------------------------------------------------------
# Axis Limits
# ----------------------------------------------------------------------------

# Octave spectrum plot: X-axis frequency range (Hz)
octave_spectrum_xlim = [15, 20000]

# Octave spectrum plot: Y-axis level range (dBFS)
octave_spectrum_ylim = [-60, 3]

# Crest factor plot: X-axis frequency range (Hz)
crest_factor_xlim = [15, 20000]

# Crest factor plot: Y-axis minimum value
crest_factor_ylim_min = 0

# Crest factor plot: Y-axis maximum value
crest_factor_ylim_max = 30

# Octave crest factor vs time: Y-axis range
octave_crest_factor_time_ylim = [0, 40]

# ----------------------------------------------------------------------------
# Histogram Parameters
# ----------------------------------------------------------------------------

# Number of bins for linear histogram (level distribution)
# More bins = finer detail but more noise
histogram_bins = 51

# Range for linear histogram (dBFS)
# Shows level distribution from min to max
histogram_range = [-1, 1]

# Number of bins for logarithmic histogram (dB scale)
log_histogram_bins = 51

# Noise floor for logarithmic histogram (dBFS)
# Values below this are excluded from log histogram
log_histogram_noise_floor_db = -60

# Maximum level for logarithmic histogram (dBFS)
log_histogram_max_db = 0

# Maximum bin size for logarithmic histogram (dB)
# Controls granularity of log histogram bins
log_histogram_max_bin_size_db = 3.0

# ----------------------------------------------------------------------------
# Output Quality
# ----------------------------------------------------------------------------

# Dots per inch for plot output (general setting)
# Higher DPI = better quality but larger file sizes
# 300 DPI is print quality, 150 DPI is screen quality
dpi = 300

# DPI for batch processing (faster, lower quality)
# Used when processing multiple files
batch_dpi = 150

# DPI for single-file analysis (higher quality)
# Used when processing individual files
high_quality_dpi = 300

# Bounding box for saved plots
# "tight" removes excess whitespace around plots
bbox_inches = "tight"


# ============================================================================
# ADVANCED STATISTICS SETTINGS
# ============================================================================
# Parameters for statistical analysis and peak classification
# ============================================================================

[advanced_stats]

# ----------------------------------------------------------------------------
# Peak Classification Thresholds
# ----------------------------------------------------------------------------

# Hot peaks threshold (dBFS)
# Peaks above this are considered "hot" (near clipping)
# Used for identifying loud but not clipping events
hot_peaks_threshold_db = -1.0

# Clipping events threshold (dBFS)
# Peaks above this are considered actual clipping
# Very close to 0 dBFS (full scale)
clip_events_threshold_db = -0.1

# Peak saturation threshold (dBFS)
# Regions above this are considered heavily compressed/saturated
# Indicates dynamic range reduction
peak_saturation_threshold_db = -3.0

# ----------------------------------------------------------------------------
# Transient Analysis
# ----------------------------------------------------------------------------

# Transient detection threshold (dB)
# Significant level changes above this threshold are detected as transients
# Used for identifying sudden changes in audio level
transient_threshold_db = 3.0

# ----------------------------------------------------------------------------
# Peak Distribution Ranges
# ----------------------------------------------------------------------------
# Defines level ranges for categorizing peaks
# Used for statistical analysis of peak distribution

# Minimum levels for each category (dBFS)
peak_distribution_ranges_min = [-0.1, -1.0, -3.0, -6.0, -12.0, -60.0]

# Maximum levels for each category (dBFS)
peak_distribution_ranges_max = [0.0, -0.1, -1.0, -3.0, -6.0, -12.0]

# Labels for each category (must match number of ranges)
peak_distribution_ranges_labels = ["clipping", "hot", "loud", "moderate", "quiet", "very_quiet"]

# ----------------------------------------------------------------------------
# Frequency Band Definitions
# ----------------------------------------------------------------------------
# Used for calculating energy in different frequency ranges

# Bass frequencies (Hz) - low frequency energy
bass_frequencies = [31.25, 62.5, 125.0]

# Mid frequencies (Hz) - mid frequency energy
mid_frequencies = [250.0, 500.0, 1000.0, 2000.0]

# Treble frequencies (Hz) - high frequency energy
treble_frequencies = [4000.0, 8000.0, 16000.0]


# ============================================================================
# FILE HANDLING SETTINGS
# ============================================================================
# Parameters for input/output file management
# ============================================================================

[file_handling]

# Supported audio file formats (extensions without dot)
# Files with these extensions will be processed
supported_formats = ["wav", "flac", "mp3", "aiff", "m4a", "mkv"]

# Create subdirectories in output directory
# If true, each track gets its own subdirectory
# If false, all files go directly into output directory
create_subdirectories = true

# Use track name for output directory
# If true, creates subdirectory named after track (without extension)
# If false, uses generic naming
use_track_name_for_output = true


# ============================================================================
# MULTI-CHANNEL AUDIO SETTINGS
# ============================================================================
# Parameters for multi-channel audio processing
# ============================================================================

[multi_channel]

# Enable multi-channel audio analysis
# If true, processes each channel separately and creates channel-specific folders
# If false, converts multi-channel to mono before analysis
enable = true


# ============================================================================
# MKV CONTAINER AND TRUEHD SUPPORT
# ============================================================================
# Parameters for MKV container and Dolby TrueHD audio extraction
# ============================================================================

[mkv_support]

# Enable MKV container and TrueHD audio support
# Requires ffmpeg to be installed and available in PATH
# If false, MKV files will be skipped or cause errors
enable = true

# Exclude Dolby Atmos metadata streams
# If true, only extracts TrueHD core audio (excludes Atmos spatial metadata)
# If false, attempts to extract all audio streams
exclude_atmos = true


# ============================================================================
# CSV EXPORT SETTINGS
# ============================================================================
# Parameters for exporting analysis results to CSV files
# ============================================================================

[export]

# Include track metadata section in CSV
# Metadata includes: filename, duration, sample rate, channels, etc.
include_track_metadata = true

# Include advanced statistics section in CSV
# Includes: peak analysis, transient analysis, frequency band energy
include_advanced_statistics = true

# Include octave band analysis section in CSV
# Includes: RMS levels, crest factors, peak levels per octave band
include_octave_band_analysis = true

# Include time domain analysis section in CSV
# Includes: RMS, peak, crest factor vs time data
include_time_domain_analysis = true

# Include time domain summary section in CSV
# Includes: statistical summary of time-domain metrics
include_time_domain_summary = true

# Include histogram data section in CSV
# Includes: level distribution histograms (linear and log)
include_histogram_data = true

# Include extreme chunks analysis section in CSV
# Includes: identification of chunks with extreme characteristics
include_extreme_chunks_analysis = true

# Note: Octave crest factor time data is excluded for efficiency
# as it would require recalculating octave analysis for every chunk


# ============================================================================
# PERFORMANCE & CACHING SETTINGS
# ============================================================================
# Parameters for optimizing performance and memory usage
# ============================================================================

[performance]

# ----------------------------------------------------------------------------
# Memory Management
# ----------------------------------------------------------------------------

# Maximum chunk size in megabytes before memory optimization kicks in
# Larger values allow bigger chunks but use more memory
max_chunk_size_mb = 100

# Enable memory optimization strategies
# Reduces memory usage at cost of slight CPU overhead
enable_memory_optimization = true

# Use float32 instead of float64 for audio data
# Reduces memory usage by 50% with minimal quality loss
# Recommended for large files or batch processing
use_float32 = true

# ----------------------------------------------------------------------------
# Parallel Processing (within a single track / channel)
# ----------------------------------------------------------------------------
#
# There are TWO separate parallel mechanisms in this app (see "Batch Processing" below).
# This section only controls the OCTAVE BANK build for ONE channel at a time.
#
# How it works (code: OctaveBandFilter.create_octave_bank_parallel):
#   - Uses a process pool (multiprocessing). Each worker runs band-pass filtering for
#     one octave center frequency below Nyquist.
#   - Effective parallelism is limited by min(number of such bands, max_workers, CPU cores).
#   - Startup cost: spawning worker processes; best payoff on long files / many bands.
#
# Interaction with [analysis] use_cascade_complementary (read that section first):
#   - use_cascade_complementary = true  (default): cascade / complementary bank path.
#     Octave bands are built SEQUENTIALLY. This flag is IGNORED for speed—there is no
#     parallel octave pool in that mode (by design).
#   - use_cascade_complementary = false: parallel filter-bank path. If enable_parallel_processing
#     is true, bands are farmed out to the pool above; if false, bands run one after another
#     in a single process.
#
# Tuning:
#   - For maximum throughput on many FILES, prefer raising max_batch_workers (batch section)
#     before turning off cascade complementary—batch parallelism scales wall time better
#     for large libraries and does not change filter topology.
#   - Turning off cascade to use this pool trades the documented filter-bank behaviour for
#     speed; compare outputs if that matters for your use case.
#
enable_parallel_processing = true

# Optional cap on worker processes for the parallel octave pool (only when cascade is off
# and enable_parallel_processing is true).
#   - Omit this key entirely: auto-select min(bands below Nyquist, logical CPU count).
#   - Set a positive integer: hard cap; the app may still run fewer tasks than bands.
#   - Invalid / empty / non-positive values are treated as "omit" (auto).
# Logs at INFO include the resolved worker count when the parallel octave path runs.
# max_workers = 8

# ----------------------------------------------------------------------------
# Caching
# ----------------------------------------------------------------------------

# Enable caching for octave bank analysis
# Creates cache files for faster re-analysis of same tracks
# DISABLED by default: Creates 500MB+ cache files per track
# Enable only if frequently re-analyzing same tracks
enable_octave_cache = false

# Directory for octave bank cache files
cache_dir = "cache/octave_banks"

# Enable result caching for plots and CSV files
# Skips regeneration if source file and config haven't changed
# Significantly speeds up re-analysis
enable_result_cache = true

# Directory for result cache metadata
result_cache_dir = "cache/results"

# ----------------------------------------------------------------------------
# Batch Processing (across multiple tracks / files)
# ----------------------------------------------------------------------------
#
# Separate from "Parallel Processing" above. When you run batch mode (default CLI: all
# files under tracks_dir), the app can analyze MULTIPLE TRACKS AT ONCE.
#
# How it works (code: main batch path with ProcessPoolExecutor):
#   - Each worker is a full Python process running analyze_single_track() for one file.
#   - One track per worker at a time; workers pick the next file when idle.
#   - RAM scales roughly with (max_batch_workers) × (memory per track)—surround, long files,
#     and high sample rates increase per-track memory. Large max_batch_workers on a machine
#     with many cores can still OOM if each track is heavy.
#
# Tuning:
#   - enable_parallel_batch = false: one track at a time (lowest peak RAM, slowest wall time).
#   - enable_parallel_batch = true: use max_batch_workers concurrent track analyses.
#   - max_batch_workers: start low (e.g. 2–4), increase while monitoring memory. Going up to
#     half of logical CPUs is often viable on high-RAM boxes; the safe value depends on
#     file size and channel count, not CPU count alone.
#   - If max_batch_workers is omitted from the file, the code uses a conservative default
#     (currently 2 workers) and logs the value at INFO.
#
enable_parallel_batch = true

# Max concurrent TRACK analyses in batch mode (integer >= 1). Not the same as max_workers
# above (octave bands within one channel). Raise this to use more cores when I/O and RAM allow.
max_batch_workers = 8


# ============================================================================
# LOGGING SETTINGS
# ============================================================================
# Parameters for logging and debug output
# ============================================================================

[logging]

# Logging level
# Options: "DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"
# DEBUG = very verbose, INFO = normal, WARNING+ = only problems
level = "INFO"

# Log message format
# Format string for log output
# %(asctime)s = timestamp, %(name)s = logger name, %(levelname)s = level, %(message)s = message
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Include debug information in logs
# Adds extra context to log messages (e.g., file paths, array shapes)
include_debug_info = false
